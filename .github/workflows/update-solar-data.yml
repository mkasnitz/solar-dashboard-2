name: Update solar dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare raw folder
        run: mkdir -p raw data

      - name: Run transform script
        run: python scripts/update_mastr_data.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/solar-latest.json
          git diff --cached --quiet || git commit -m "Update solar dashboard data"
          git push
